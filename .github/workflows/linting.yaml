name: Run Linting

on:
  push:
    branches:
      - '**'

  pull_request:
    branches:
      - '**'

  workflow_dispatch:
    inputs:
      NODE_VERSION:
        description: Node.js Version (lts/*, 18, 20, etc)
        type: string
        required: true
        default: lts/*

jobs:
  linting:
    name: Lint JavaScript Code
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: integration

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Load Node.js version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            source .github/config/versions.txt
            echo "NODE_VERSION=$NODE_VERSION" >> "$GITHUB_ENV"
          else
            echo "NODE_VERSION=${{ github.event.inputs.NODE_VERSION }}" >> "$GITHUB_ENV"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        shell: bash
        run: npm install

      - name: Run ESLint
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee eslint-report.txt

      - name: Upload ESLint report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.txt
          if-no-files-found: ignore
